<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div class="max-w-3xl mx-auto mt-20 px-6 text-center">
    <h1 th:text="${greeting}"
        class="text-4xl font-bold text-emerald-400">
        Greeting
    </h1>

    <a th:href="@{/}"
       class="inline-block mt-6 bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-lg font-semibold transition">
        Home
    </a>
</div>

</body>
</html>
