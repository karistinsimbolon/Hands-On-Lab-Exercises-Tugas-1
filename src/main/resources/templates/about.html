<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-4xl mx-auto mt-10 px-6">
    <h1 class="text-3xl font-bold text-emerald-400" th:text="${appName}">App Name</h1>

    <p class="mt-4 text-gray-300"><strong>Version:</strong> <span th:text="${version}"></span></p>
    <p class="text-gray-300"><strong>Author:</strong> <span th:text="${author}"></span></p>

    <h3 class="mt-6 text-xl font-semibold text-emerald-400">Technologies Used:</h3>
    <ul class="mt-3 space-y-2">
        <li class="bg-slate-800 px-4 py-2 rounded-lg border border-emerald-500/20"
            th:each="tech : ${technologies}" th:text="${tech}"></li>
    </ul>

    <a th:href="@{/}" class="inline-block mt-6 bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-lg font-semibold transition">
        Home
    </a>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
