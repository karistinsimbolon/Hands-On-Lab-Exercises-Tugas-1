<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-20">
    <div class="max-w-2xl mx-auto bg-slate-800 p-10 rounded-2xl shadow-lg border border-emerald-500/20">
        <h1 class="text-3xl font-bold text-white mb-6" th:text="${product.name}"></h1>
        <p class="mb-4 text-slate-400">Category: <span class="text-white ml-2" th:text="${product.category}"></span></p>
        <p class="text-3xl font-bold text-emerald-400 mb-8" th:text="${product.price}"></p>
        <p class="mb-8 text-lg"><span class="text-slate-400">Stock:</span> <span class="font-bold text-emerald-300 text-xl ml-2" th:text="${product.stock}"></span></p>
        <a th:href="@{/products}" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-6 py-3 rounded-lg transition">Back to List</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
