<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div class="max-w-4xl mx-auto mt-10 px-6">
    <h1 class="text-3xl font-bold text-emerald-400">Daftar Kategori</h1>

    <ul class="mt-6 space-y-3">
        <li class="bg-slate-800 p-4 rounded-lg border border-emerald-500/20 hover:bg-slate-700 transition"
            th:each="category : ${categories}">
            <a class="text-emerald-300 font-semibold hover:text-emerald-200"
               th:href="@{/products/category/{cat}(cat=${category})}"
               th:text="${category}">
            </a>
        </li>
    </ul>

    <a th:href="@{/products}"
       class="inline-block mt-6 bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-lg font-semibold transition">
        Back to Products
    </a>
</div>

</body>
</html>
