<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 pb-20">
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-10">
        <div th:each="product : ${products}" class="bg-slate-800 rounded-2xl p-6 shadow-lg border border-emerald-500/20 hover:shadow-emerald-500/30 transition duration-300">
            <h3 class="text-xl font-bold text-white mb-3"
            th:text="${product.name}"></h3>
            <span class="bg-emerald-500/20 text-emerald-300 text-sm px-3 py-1 rounded-full"
            th:text="${product.category}"></span>
            <p class="text-2xl font-bold text-emerald-400 mt-5 mb-6"
            th:text="${product.price}"></p>
            <a th:href="@{/products/{id}(id=${product.id})}" class="block text-center bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 rounded-lg transition">View Detail</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
