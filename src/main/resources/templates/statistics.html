<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Statistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-5xl mx-auto mt-10 px-6">
    <h2 class="text-3xl font-bold text-emerald-400">Statistik Produk</h2>
    <hr class="my-4 border-emerald-500/30">

    <p class="mt-4">
        <strong>Total Produk:</strong>
        <span th:text="${totalProducts}"></span>
    </p>

    <h5 class="mt-6 font-semibold text-emerald-400">
        Total Per Kategori:
    </h5>
    <ul class="mt-3 space-y-2">
        <li class="bg-slate-800 px-4 py-2 rounded-lg border border-emerald-500/20"
            th:each="entry : ${totalPerCategory}">
            <span th:text="${entry.key}"></span> :
            <span th:text="${entry.value}"></span>
        </li>
    </ul>

    <p class="mt-6">
        <strong>Produk Termahal:</strong>
        <span th:text="${mostExpensive.name}"></span>
        (Rp <span th:text="${mostExpensive.price}"></span>)
    </p>

    <p>
        <strong>Produk Termurah:</strong>
        <span th:text="${cheapest.name}"></span>
        (Rp <span th:text="${cheapest.price}"></span>)
    </p>

    <p>
        <strong>Rata-rata Harga:</strong>
        Rp <span th:text="${averagePrice}"></span>
    </p>

    <p>
        <strong>Jumlah Produk Stok &lt; 20:</strong>
        <span th:text="${lowStockCount}"></span>
    </p>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
