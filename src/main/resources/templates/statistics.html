<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Statistik</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container main-content mt-4">
    <h2>Statistik Produk</h2>
    <hr>

    <p><strong>Total Produk:</strong> <span th:text="${totalProducts}"></span></p>

    <h5>Total Per Kategori:</h5>
    <ul>
        <li th:each="entry : ${totalPerCategory}">
            <span th:text="${entry.key}"></span> :
            <span th:text="${entry.value}"></span>
        </li>
    </ul>

    <p>
        <strong>Produk Termahal:</strong>
        <span th:text="${mostExpensive.name}"></span>
        (Rp <span th:text="${mostExpensive.price}"></span>)
    </p>

    <p>
        <strong>Produk Termurah:</strong>
        <span th:text="${cheapest.name}"></span>
        (Rp <span th:text="${cheapest.price}"></span>)
    </p>

    <p>
        <strong>Rata-rata Harga:</strong>
        Rp <span th:text="${averagePrice}"></span>
    </p>

    <p>
        <strong>Jumlah Produk Stok < 20:</strong>
        <span th:text="${lowStockCount}"></span>
    </p>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
